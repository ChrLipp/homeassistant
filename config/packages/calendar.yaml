automation:
  - id: 'notify_calendar_entry'
    alias: "Notify: Morgendliche Kalender Benachrichtigung"
    trigger:
      - platform: time
        at: "08:00:00"
    action:
      # Wir setzen den Start auf jeweils 1s vor den Anfang des heutigen Tages und das Ende auf Mitternacht
      # Ganztägige Termine gehen bei Google von 0:00:00 bis 0:00:00, diese würden sonst doppelt ausgegeben werden
      - action: calendar.get_events
        target:
          entity_id: 
            - calendar.familie
            - calendar.geburtstage
        data:
          start_date_time: "{{ today_at('00:00:01') }}"
          end_date_time: "{{ today_at('23:59:59') }}"
        response_variable: agenda
    
      # Da wir beide Kalender gleichzeitig abgefragt haben, prüfen wir die Ergebnisse.
      # Mehrtägigen Terminen nehmen wir nur mit, wenn sie heute beginnen.
      - if:
          - condition: template
            value_template: >
              {% set ns = namespace(eventCount = agenda['calendar.geburtstage'].events | count) %}
              {% set today = now().strftime('%Y-%m-%d') %}
              {% for event in agenda['calendar.familie'].events %}
                {% if event.start[:10] == today %}
                  {% set ns.eventCount = ns.eventCount + 1 %}
                {% endif %}
              {% endfor %}
              {{ ns.eventCount > 0 }}
        then:
          - action: notify.send_message
            data:
              entity_id: notify.telegram_all
              message: |
                Was steht heute an?
                {%- set today = now().strftime('%Y-%m-%d') -%}
                
                {%- set fam = agenda['calendar.familie'].events -%}
                {%- if fam | count > 0 -%}
                  {%- for event in fam %}
                    {%- if event.start[:10] == today %}
                      {%- if event.start | length == 10 %}
                        {%- set eventLength = (as_datetime(event.end) - as_datetime(event.start)).days %}
                - Ganztägig: {{ event.summary }}{{ " (" ~ eventLength ~ " Tage)" if eventLength > 1 else "" }}
                      {%- else %}
                - {{ event.start | as_timestamp | timestamp_custom('%H:%M') }}-{{ event.end | as_timestamp | timestamp_custom('%H:%M') }}: {{ event.summary }}
                      {%- endif %}
                    {%- endif %}
                  {%- endfor %}
                {%- endif -%}
                
                {%- set bday = agenda['calendar.geburtstage'].events -%}
                {%- if bday | count > 0 -%}
                  {%- for event in bday %}
                    {%- if event.start[:10] == today %}
                      {%- set eventLength = (as_datetime(event.end) - as_datetime(event.start)).days %}
                - {{ event.summary }}{{ " (" ~ eventLength ~ " Tage)" if eventLength > 1 else "" }}
                    {%- endif %}
                  {%- endfor %}
                {%- endif -%}
    mode: single